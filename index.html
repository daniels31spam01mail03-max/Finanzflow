<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0F6E56">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FinanzFlow">
<meta name="mobile-web-app-capable" content="yes">
<title>FinanzFlow</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<style>
  :root {
    --green: #1D9E75;
    --green-dark: #0F6E56;
    --green-light: #E1F5EE;
    --red: #D85A30;
    --red-light: #FAECE7;
    --bg: #F5F5F0;
    --surface: #FFFFFF;
    --surface2: #F0EFE9;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.14);
    --text: #1A1A18;
    --text2: #6B6B66;
    --text3: #9A9A94;
    --radius: 16px;
    --radius-sm: 10px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111110;
      --surface: #1C1C1A;
      --surface2: #242422;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text: #F0EFE8;
      --text2: #9A9A94;
      --text3: #6B6B66;
      --green-light: #0a2e22;
      --red-light: #2e150c;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    max-width: 480px;
    margin: 0 auto;
    position: relative;
  }

  .app {
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  .header {
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    padding: env(safe-area-inset-top, 0) 0 0;
    flex-shrink: 0;
    z-index: 10;
  }
  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px 10px;
  }
  .app-logo {
    font-size: 19px;
    font-weight: 700;
    letter-spacing: -0.6px;
    color: var(--text);
  }
  .app-logo span { color: var(--green); }
  .period-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    background: var(--surface2);
    padding: 5px 12px;
    border-radius: 20px;
    border: 0.5px solid var(--border);
  }

  /* ── FILTER BAR ── */
  .filter-bar {
    display: flex;
    gap: 7px;
    padding: 10px 16px 12px;
    overflow-x: auto;
    scrollbar-width: none;
    align-items: center;
  }
  .filter-bar::-webkit-scrollbar { display: none; }

  .chip {
    border: 0.5px solid var(--border2);
    background: var(--surface2);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    color: var(--text2);
    transition: all 0.15s;
    flex-shrink: 0;
    -webkit-appearance: none;
    appearance: none;
  }
  .chip.active, .chip:active { background: var(--green); border-color: var(--green); color: white; }

  select.chip {
    font-family: inherit;
    font-size: 12px;
    padding-right: 10px;
  }

  /* ── SCROLL AREA ── */
  .scroll-area {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 14px 14px 100px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 0;
  }

  /* ── SUMMARY CARDS ── */
  .summary-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .sum-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer;
    transition: transform 0.1s, border-color 0.15s;
    active-transform: scale(0.97);
    user-select: none;
  }
  .sum-card:active { transform: scale(0.97); }
  .sum-card.income-card { border-left: 3px solid var(--green); }
  .sum-card.expense-card { border-left: 3px solid var(--red); }

  .sum-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text2);
    margin-bottom: 8px;
  }
  .sum-amount {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.8px;
    line-height: 1;
  }
  .sum-amount.green { color: var(--green); }
  .sum-amount.red { color: var(--red); }
  .sum-hint { font-size: 10px; color: var(--text3); margin-top: 6px; }

  /* ── BALANCE CARD ── */
  .balance-card {
    background: var(--green);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .balance-label { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.7); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px; }
  .balance-amount { font-size: 24px; font-weight: 700; color: white; letter-spacing: -1px; }
  .balance-icon { font-size: 28px; opacity: 0.7; }

  /* ── CARD CONTAINER ── */
  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .card-header {
    padding: 14px 16px;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card-header-title { font-size: 13px; font-weight: 600; flex: 1; }
  .card-header-amount { font-size: 15px; font-weight: 700; }
  .card-header-amount.green { color: var(--green); }
  .card-header-amount.red { color: var(--red); }

  .back-btn {
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    cursor: pointer;
    font-family: inherit;
  }

  /* ── LIST ITEMS ── */
  .list-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 0.5px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
    user-select: none;
  }
  .list-item:last-child { border-bottom: none; }
  .list-item:active { background: var(--surface2); }

  .item-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
  }
  .item-info { flex: 1; overflow: hidden; min-width: 0; }
  .item-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .item-right { text-align: right; flex-shrink: 0; }
  .item-amount { font-size: 14px; font-weight: 600; }
  .item-amount.green { color: var(--green); }
  .item-amount.red { color: var(--red); }
  .item-pct { font-size: 10px; color: var(--text3); margin-top: 2px; }
  .item-arrow { font-size: 14px; color: var(--text3); margin-left: 4px; }

  /* BAR */
  .bar-wrap { padding: 0 16px 10px; }
  .bar-bg { height: 3px; background: var(--surface2); border-radius: 2px; }
  .bar-fill { height: 3px; border-radius: 2px; transition: width 0.4s ease; }
  .bar-fill.green { background: var(--green); }
  .bar-fill.red { background: var(--red); }

  /* ── TRANSACTIONS ── */
  .tx-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    border-bottom: 0.5px solid var(--border);
  }
  .tx-item:last-child { border-bottom: none; }
  .tx-icon {
    width: 34px; height: 34px;
    border-radius: 9px;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }
  .tx-info { flex: 1; min-width: 0; }
  .tx-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-date { font-size: 11px; color: var(--text2); margin-top: 1px; }
  .tx-amount { font-size: 13px; font-weight: 600; flex-shrink: 0; }
  .tx-amount.green { color: var(--green); }
  .tx-amount.red { color: var(--red); }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center;
    padding: 44px 24px;
  }
  .empty-emoji { font-size: 52px; margin-bottom: 14px; }
  .empty-title { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
  .empty-sub { font-size: 13px; color: var(--text2); line-height: 1.6; }

  /* ── UPLOAD TAB ── */
  .upload-zone {
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius);
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
  }
  .upload-zone:active, .upload-zone.has-file { border-color: var(--green); background: var(--green-light); }
  .upload-zone-icon { font-size: 40px; margin-bottom: 12px; }
  .upload-zone-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .upload-zone-sub { font-size: 12px; color: var(--text2); }

  .btn {
    width: 100%;
    padding: 15px;
    border-radius: var(--radius-sm);
    border: none;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-secondary { background: var(--surface); border: 0.5px solid var(--border2); color: var(--text); }
  .btn-primary { background: var(--green); color: white; }
  .btn-primary:active { background: var(--green-dark); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .error-box {
    background: var(--red-light);
    border: 0.5px solid var(--red);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 13px;
    color: var(--red);
    line-height: 1.5;
  }

  /* ── STATEMENTS LIST ── */
  .section-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text3);
    padding: 0 4px;
    margin-bottom: 6px;
  }

  .stmt-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }
  .stmt-icon { font-size: 22px; }
  .stmt-info { flex: 1; min-width: 0; }
  .stmt-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .stmt-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .stmt-del { background: none; border: none; font-size: 18px; cursor: pointer; padding: 4px 6px; color: var(--text3); }

  /* ── LOADING ── */
  .loading-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 40px 24px;
    text-align: center;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 2.5px solid var(--border2);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
    margin: 0 auto 18px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .loading-sub { font-size: 12px; color: var(--text2); line-height: 1.6; }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 0.5px solid var(--border);
    display: flex;
    padding-bottom: env(safe-area-inset-bottom, 0);
    z-index: 10;
    flex-shrink: 0;
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 10px 0 8px;
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    color: var(--text3);
    font-size: 10px;
    font-weight: 500;
    transition: color 0.15s;
  }
  .nav-btn.active { color: var(--green); }
  .nav-btn-icon { font-size: 22px; }

  /* ── CONFIRM DIALOG ── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 50;
    padding: 0;
  }
  .dialog {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 20px 20px calc(20px + env(safe-area-inset-bottom, 0));
    width: 100%;
    max-width: 480px;
  }
  .dialog-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
  .dialog-sub { font-size: 13px; color: var(--text2); margin-bottom: 20px; line-height: 1.5; }
  .dialog-btns { display: flex; gap: 10px; }
  .dialog-btn { flex: 1; padding: 13px; border-radius: var(--radius-sm); border: none; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; }
  .dialog-btn.cancel { background: var(--surface2); color: var(--text); border: 0.5px solid var(--border2); }
  .dialog-btn.confirm { background: var(--red); color: white; }
</style>
</head>
<body>
<div class="app" id="app">
  <!-- rendered by JS -->
</div>

<script>
'use strict';

// ── STORAGE ──
const STORAGE_KEY = 'finanzflow_v2';
const FILTER_KEY  = 'finanzflow_filter_v2';

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { statements: [], transactions: [] }; }
  catch { return { statements: [], transactions: [] }; }
}
function saveData(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }

function loadFilter() {
  try {
    const f = JSON.parse(localStorage.getItem(FILTER_KEY));
    if (f) return f;
  } catch {}
  const now = new Date();
  return { mode: 'month', year: now.getFullYear(), month: now.getMonth() + 1 };
}
function saveFilter(f) { localStorage.setItem(FILTER_KEY, JSON.stringify(f)); }

// ── CONSTANTS ──
const MONTHS_SHORT = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
const MONTHS_LONG  = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

const ICONS = {
  'Essen & Trinken':'🍽️','Supermarkt':'🛒','Fastfood':'🍔','Restaurant':'🍜','Bäckerei':'🥐','Kantine':'🏢','Lieferservice':'🛵',
  'Transport':'🚗','Tanken':'⛽','ÖPNV':'🚆','Parken':'🅿️','Autobahn':'🛣️','Taxi':'🚕',
  'Shopping':'🛍️','Kleidung':'👕','Elektronik':'💻','Online-Shopping':'📦','Haushalt':'🏠','Drogerie':'🧴',
  'Gesundheit':'💊','Apotheke':'💊','Arzt':'🏥','Fitness':'🏋️',
  'Freizeit':'🎮','Streaming':'📺','Kino':'🎬','Bar & Nightlife':'🍻','Hobbys':'🎯','Reisen':'✈️',
  'Wohnen':'🏠','Miete':'🔑','Nebenkosten':'💡','Versicherung':'🛡️','Internet':'📡','GEZ':'📻',
  'Finanzen':'💳','Sparen':'🏦','Investitionen':'📈','Gebühren':'💸','Kredit':'🏦',
  'Einnahmen':'💚','Gehalt':'💼','Nebeneinkommen':'💡','Erstattung':'↩️','Sonstige Einnahmen':'💰',
  'Sonstiges':'📋',
};
function icon(name) { return ICONS[name] || '📋'; }

// ── FORMAT ──
function fmt(n) {
  const abs = Math.abs(n);
  const str = abs.toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return (n < 0 ? '−' : '') + str + ' €';
}
function fmtPos(n) {
  return Math.abs(n).toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';
}

// ── STATE ──
let state = {
  tab: 'home',
  filter: loadFilter(),
  data: loadData(),
  // navigation within home tab — each level: 'home' | 'categories' | 'subcategories' | 'transactions'
  navStack: [],   // stack of { view, viewType, viewCat, viewSub }
  // upload
  pendingFile: null,
  pendingName: null,
  analyzing: false,
  error: null,
  // confirm dialog
  confirmDelete: null,
};

// ── FILTER HELPERS ──
function getFilteredTx() {
  const { mode, year, month, fromYear, fromMonth, toYear, toMonth } = state.filter;
  return state.data.transactions.filter(tx => {
    const d = new Date(tx.date);
    if (!d || isNaN(d)) return false;
    const y = d.getFullYear(), m = d.getMonth() + 1;
    if (mode === 'month') return y === year && m === month;
    if (mode === 'year')  return y === year;
    if (mode === 'range') {
      const txN   = y * 12 + m;
      const fromN = (fromYear || year) * 12 + ((fromMonth || 1));
      const toN   = (toYear   || year) * 12 + ((toMonth   || 12));
      return txN >= fromN && txN <= toN;
    }
    return true;
  });
}

function calcSummary(txList) {
  let income = 0, expense = 0;
  txList.forEach(tx => {
    if (tx.amount > 0) income  += tx.amount;
    else               expense += Math.abs(tx.amount);
  });
  return { income, expense, balance: income - expense };
}

function groupBy(txList, type) {
  const sign = type === 'income' ? 1 : -1;
  const items = txList.filter(tx => sign * tx.amount > 0);
  const cats = {};
  items.forEach(tx => {
    const c = tx.category || 'Sonstiges';
    const s = tx.subcategory || c;
    if (!cats[c]) cats[c] = { name: c, amount: 0, subs: {}, txCount: 0 };
    cats[c].amount   += Math.abs(tx.amount);
    cats[c].txCount  += 1;
    if (!cats[c].subs[s]) cats[c].subs[s] = { name: s, amount: 0, txs: [] };
    cats[c].subs[s].amount += Math.abs(tx.amount);
    cats[c].subs[s].txs.push(tx);
  });
  return Object.values(cats).sort((a, b) => b.amount - a.amount);
}

function filterLabel() {
  const { mode, year, month, fromYear, fromMonth, toYear, toMonth } = state.filter;
  if (mode === 'month') return `${MONTHS_LONG[month - 1]} ${year}`;
  if (mode === 'year')  return `Jahr ${year}`;
  if (mode === 'range') return `${MONTHS_SHORT[(fromMonth||1)-1]} ${fromYear} – ${MONTHS_SHORT[(toMonth||12)-1]} ${toYear}`;
  return 'Alle';
}

function currentNav() {
  if (state.navStack.length === 0) return { view: 'home' };
  return state.navStack[state.navStack.length - 1];
}

function pushNav(entry) { state.navStack.push(entry); }
function popNav()       { state.navStack.pop(); }

// ── RENDER ──
function render() {
  const app = document.getElementById('app');
  const txList = getFilteredTx();
  const summary = calcSummary(txList);
  const nav = currentNav();

  let content = '';
  if (state.tab === 'home') {
    if (nav.view === 'home')          content = renderHome(txList, summary);
    else if (nav.view === 'categories')   content = renderCategories(txList, summary, nav);
    else if (nav.view === 'subcategories') content = renderSubcategories(txList, nav);
    else if (nav.view === 'transactions') content = renderTransactions(txList, nav);
  } else if (state.tab === 'upload') {
    content = renderUpload();
  } else if (state.tab === 'settings') {
    content = renderSettings();
  }

  app.innerHTML = `
    ${renderHeader(summary)}
    <div class="scroll-area">${content}</div>
    ${renderNav()}
    ${state.confirmDelete ? renderConfirm() : ''}
  `;

  bindEvents();
}

// ── HEADER ──
function renderHeader(summary) {
  const { mode, year, month, fromYear, fromMonth, toYear, toMonth } = state.filter;
  const curY = new Date().getFullYear();
  const curM = new Date().getMonth() + 1;

  const years = [];
  for (let y = curY; y >= curY - 4; y--) years.push(y);

  const monthOpts = MONTHS_SHORT.map((m, i) =>
    `<option value="${i+1}" ${month === i+1 ? 'selected' : ''}>${m}</option>`).join('');
  const yearOpts = years.map(y =>
    `<option value="${y}" ${year === y ? 'selected' : ''}>${y}</option>`).join('');
  const fromYearOpts = years.map(y =>
    `<option value="${y}" ${(fromYear||curY) === y ? 'selected' : ''}>${y}</option>`).join('');
  const toYearOpts = years.map(y =>
    `<option value="${y}" ${(toYear||curY) === y ? 'selected' : ''}>${y}</option>`).join('');
  const fromMonthOpts = MONTHS_SHORT.map((m, i) =>
    `<option value="${i+1}" ${(fromMonth||1) === i+1 ? 'selected' : ''}>${m}</option>`).join('');
  const toMonthOpts = MONTHS_SHORT.map((m, i) =>
    `<option value="${i+1}" ${(toMonth||curM) === i+1 ? 'selected' : ''}>${m}</option>`).join('');

  let filterControls = '';
  if (mode === 'month') {
    filterControls = `
      <select class="chip active" id="sel-month">${monthOpts}</select>
      <select class="chip active" id="sel-year">${yearOpts}</select>`;
  } else if (mode === 'year') {
    filterControls = `<select class="chip active" id="sel-year">${yearOpts}</select>`;
  } else if (mode === 'range') {
    filterControls = `
      <span style="font-size:11px;color:var(--text3);flex-shrink:0">Von</span>

// ── CLAUDE API ──
async function analyzeWithClaude(pdfBase64) {
  const prompt = `Du bist ein Buchhalter. Extrahiere ALLE Buchungen aus diesem deutschen Kontoauszug und gib sie als JSON-Array zurück.

Jede Buchung:
- date: "YYYY-MM-DD"
- description: Buchungstext, max 45 Zeichen, klar und lesbar
- amount: Zahl (positiv = Einnahme/Gutschrift, negativ = Ausgabe/Lastschrift/Abbuchung)
- category: Oberkategorie. Mögliche Werte: "Essen & Trinken", "Transport", "Shopping", "Gesundheit", "Freizeit", "Wohnen", "Finanzen", "Einnahmen", "Sonstiges"
- subcategory: Unterkategorie. Beispiele: Supermarkt, Fastfood, Restaurant, Bäckerei, Lieferservice / Tanken, ÖPNV, Parken, Autobahn, Taxi / Kleidung, Elektronik, Online-Shopping, Drogerie / Apotheke, Arzt, Fitness / Streaming, Kino, Bar & Nightlife, Hobbys, Reisen / Miete, Nebenkosten, Versicherung, Internet, GEZ / Gehalt, Erstattung, Nebeneinkommen, Sonstige Einnahmen / Sparen, Investitionen, Gebühren, Kredit

Wichtig: Gehaltseingänge, Gutschriften, Überweisungen auf das Konto = positiver Betrag und category "Einnahmen".
Antworte NUR mit dem JSON-Array, kein Text davor oder danach, keine Markdown-Formatierung:
[{"date":"...","description":"...","amount":0,"category":"...","subcategory":"..."}]`;

  const API_KEY = localStorage.getItem('finanzflow_apikey') || '';
  if (!API_KEY) throw new Error('Kein API Key gespeichert. Bitte trage deinen Key in den Einstellungen ein.');

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': API_KEY,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-5',
      max_tokens: 4000,
      messages: [{
        role: 'user',
        content: [
          { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: pdfBase64 } },
          { type: 'text', text: prompt }
        ]
      }]
    })
  });

  if (!response.ok) {
    let msg = `API-Fehler ${response.status}`;
    try { const e = await response.json(); msg = e.error?.message || msg; } catch {}
    throw new Error(msg);
  }

  const data = await response.json();
  const text = data.content.map(c => c.text || '').join('');
  const clean = text.replace(/```json|```/g, '').trim();

  let transactions;
  try { transactions = JSON.parse(clean); }
  catch { throw new Error('Claude konnte den Kontoauszug nicht auslesen. Bitte stelle sicher, dass die PDF Textinhalte enthält (nicht gescannt).'); }

  if (!Array.isArray(transactions)) throw new Error('Unerwartetes Format von Claude.');
  return transactions;
}

async function handleAnalyze() {
  if (!state.pendingFile) return;
  state.analyzing = true;
  state.error = null;
  render();

  try {
    const base64 = await new Promise((res, rej) => {
      const reader = new FileReader();
      reader.onload  = () => res(reader.result.split(',')[1]);
      reader.onerror = () => rej(new Error('Datei konnte nicht gelesen werden.'));
      reader.readAsDataURL(state.pendingFile);
    });

    // Duplikat-Check: Hash aus Dateiname + Größe + letztes Änderungsdatum
    const fileHash = `${state.pendingFile.name}_${state.pendingFile.size}_${state.pendingFile.lastModified}`;
    const duplicate = state.data.statements.find(s => s.fileHash === fileHash);
    if (duplicate) {
      throw new Error(`Dieser Kontoauszug wurde bereits am ${new Date(duplicate.uploadedAt).toLocaleDateString('de-DE')} hochgeladen. Es handelt sich um exakt die gleiche Datei.`);
    }

    const transactions = await analyzeWithClaude(base64);

    const stmtId = 'stmt_' + Date.now();
    state.data.statements.push({
      id: stmtId,
      name: state.pendingName,
      fileHash,
      uploadedAt: new Date().toISOString(),
      txCount: transactions.length,
    });

    transactions.forEach((tx, i) => {
      state.data.transactions.push({ ...tx, id: stmtId + '_' + i, statementId: stmtId });
    });

    saveData(state.data);
    state.pendingFile = null;
    state.pendingName = null;
    state.tab = 'home';
    state.navStack = [];
  } catch (e) {
    state.error = e.message;
  }

  state.analyzing = false;
  render();
}

function deleteStatement(stmtId) {
  state.data.statements   = state.data.statements.filter(s => s.id !== stmtId);
  state.data.transactions = state.data.transactions.filter(tx => tx.statementId !== stmtId);
  saveData(state.data);
  state.confirmDelete = null;
  render();
}

// ── BIND EVENTS ──
function bindEvents() {
  // Nav tabs
  document.getElementById('nav-settings')?.addEventListener('click', () => {
    state.tab = 'settings'; render();
  });

  // Settings
  document.getElementById('btn-save-key')?.addEventListener('click', () => {
    const val = document.getElementById('api-key-input')?.value?.trim();
    if (!val) { alert('Bitte einen API Key eingeben.'); return; }
    if (!val.startsWith('sk-ant-')) { alert('Das sieht nicht wie ein gültiger Claude API Key aus. Er muss mit sk-ant- beginnen.'); return; }
    localStorage.setItem('finanzflow_apikey', val);
    render();
  });

  document.getElementById('btn-clear-data')?.addEventListener('click', () => {
    if (confirm('Wirklich ALLE Buchungen und Kontoauszüge löschen? Das kann nicht rückgängig gemacht werden.')) {
      state.data = { statements: [], transactions: [] };
      saveData(state.data);
      render();
    }
  });
  document.getElementById('nav-home')?.addEventListener('click', () => {
    state.tab = 'home'; state.navStack = []; render();
  });
  document.getElementById('nav-upload')?.addEventListener('click', () => {
    state.tab = 'upload';
    render();
  });

  // Filter mode chips
  document.querySelectorAll('[data-mode]').forEach(el => {
    el.addEventListener('click', () => {
      const mode = el.dataset.mode;
      const now  = new Date();
      const curY = now.getFullYear();
      const curM = now.getMonth() + 1;
      if (mode === 'month')  state.filter = { mode, year: curY, month: curM };
      if (mode === 'year')   state.filter = { mode, year: curY };
      if (mode === 'range')  state.filter = { mode, fromYear: curY, fromMonth: 1, toYear: curY, toMonth: curM };
      saveFilter(state.filter);
      render();
    });
  });

  // Filter selects
  function bindSel(id, key) {
    document.getElementById(id)?.addEventListener('change', e => {
      state.filter[key] = +e.target.value;
      saveFilter(state.filter);
      render();
    });
  }
  bindSel('sel-month',      'month');
  bindSel('sel-year',       'year');
  bindSel('sel-from-month', 'fromMonth');
  bindSel('sel-from-year',  'fromYear');
  bindSel('sel-to-month',   'toMonth');
  bindSel('sel-to-year',    'toYear');

  // Summary cards
  document.getElementById('card-income')?.addEventListener('click', () => {
    pushNav({ view: 'categories', viewType: 'income' });
    render();
  });
  document.getElementById('card-expense')?.addEventListener('click', () => {
    pushNav({ view: 'categories', viewType: 'expense' });
    render();
  });

  // Category items
  document.querySelectorAll('[data-cat]').forEach(el => {
    el.addEventListener('click', () => {
      const catName = decodeURIComponent(el.dataset.cat);
      const nav = currentNav();
      const txList = getFilteredTx();
      const cats = groupBy(txList, nav.viewType);
      const cat  = cats.find(c => c.name === catName);
      if (!cat) return;
      const hasSubs = Object.keys(cat.subs).length > 1;
      if (hasSubs) {
        pushNav({ view: 'subcategories', viewType: nav.viewType, viewCat: catName });
      } else {
        const subName = Object.keys(cat.subs)[0];
        pushNav({ view: 'transactions', viewType: nav.viewType, viewCat: catName, viewSub: subName });
      }
      render();
    });
  });

  // Subcategory items
  document.querySelectorAll('[data-sub]').forEach(el => {
    el.addEventListener('click', () => {
      const subName = decodeURIComponent(el.dataset.sub);
      const nav = currentNav();
      pushNav({ view: 'transactions', viewType: nav.viewType, viewCat: nav.viewCat, viewSub: subName });
      render();
    });
  });

  // Back
  document.getElementById('btn-back')?.addEventListener('click', () => {
    popNav();
    render();
  });

  // Upload
  const fileInput = document.getElementById('file-input');
  document.getElementById('btn-select')?.addEventListener('click', () => fileInput?.click());
  document.getElementById('upload-zone')?.addEventListener('click', () => fileInput?.click());
  fileInput?.addEventListener('change', e => {
    const f = e.target.files[0];
    if (f) { state.pendingFile = f; state.pendingName = f.name; state.error = null; render(); }
  });
  document.getElementById('btn-analyze')?.addEventListener('click', handleAnalyze);

  // Delete statement — open confirm
  document.querySelectorAll('[data-del]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const stmtId = el.dataset.del;
      const stmt = state.data.statements.find(s => s.id === stmtId);
      if (stmt) { state.confirmDelete = stmt; render(); }
    });
  });

  // Confirm dialog
  document.getElementById('btn-cancel-del')?.addEventListener('click', () => {
    state.confirmDelete = null; render();
  });
  document.getElementById('btn-confirm-del')?.addEventListener('click', () => {
    if (state.confirmDelete) deleteStatement(state.confirmDelete.id);
  });
  document.getElementById('overlay')?.addEventListener('click', e => {
    if (e.target.id === 'overlay') { state.confirmDelete = null; render(); }
  });
}

// ── INIT ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
render();
</script>
</body>
</html>
