<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0F6E56">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FinanzFlow">
<meta name="mobile-web-app-capable" content="yes">
<title>FinanzFlow</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<style>
:root{--g:#1D9E75;--gd:#0F6E56;--gl:#E1F5EE;--r:#D85A30;--rl:#FAECE7;--b:#3B7DD8;--o:#E08A2A;--bg:#F5F5F0;--s:#FFF;--s2:#F0EFE9;--bd:rgba(0,0,0,.08);--bd2:rgba(0,0,0,.14);--t:#1A1A18;--t2:#6B6B66;--t3:#9A9A94;--rad:16px;--rads:10px}
@media(prefers-color-scheme:dark){:root{--bg:#111110;--s:#1C1C1A;--s2:#242422;--bd:rgba(255,255,255,.08);--bd2:rgba(255,255,255,.14);--t:#F0EFE8;--t2:#9A9A94;--t3:#6B6B66;--gl:#0a2e22;--rl:#2e150c}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;background:var(--bg);color:var(--t);max-width:480px;margin:0 auto}
.app{height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* PIN */
.pin-screen{position:fixed;inset:0;background:var(--s);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;padding:32px 24px;max-width:480px;margin:0 auto}
.pin-logo{font-size:24px;font-weight:700;letter-spacing:-.6px;margin-bottom:6px}
.pin-logo span{color:var(--g)}
.pin-title{font-size:16px;font-weight:600;margin-bottom:6px;text-align:center}
.pin-sub{font-size:13px;color:var(--t2);text-align:center;line-height:1.6;margin-bottom:32px;max-width:280px}
.pin-dots{display:flex;gap:16px;margin-bottom:40px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--bd2);background:transparent;transition:all .15s}
.pin-dot.filled{background:var(--g);border-color:var(--g)}
.pin-dot.error{background:var(--r);border-color:var(--r)}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:280px}
.pin-key{aspect-ratio:1;border-radius:50%;border:.5px solid var(--bd2);background:var(--s2);font-size:22px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--t);display:flex;align-items:center;justify-content:center;transition:all .1s;user-select:none}
.pin-key:active{transform:scale(.92);background:var(--g);color:#fff;border-color:var(--g)}
.pin-key.empty{background:transparent;border:none;cursor:default}
.pin-err{font-size:13px;color:var(--r);margin-top:16px;text-align:center;min-height:20px}
.pin-reset{margin-top:20px;background:none;border:none;font-size:13px;color:var(--t3);cursor:pointer;font-family:inherit;text-decoration:underline}

/* HEADER */
.hdr{background:var(--s);border-bottom:.5px solid var(--bd);padding:env(safe-area-inset-top,0) 0 0;flex-shrink:0;z-index:10}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 10px}
.logo{font-size:19px;font-weight:700;letter-spacing:-.6px}
.logo span{color:var(--g)}
.period{font-size:12px;font-weight:500;color:var(--t2);background:var(--s2);padding:5px 12px;border-radius:20px;border:.5px solid var(--bd)}

/* FILTER */
.fbar{display:flex;gap:7px;padding:10px 16px 12px;overflow-x:auto;scrollbar-width:none;align-items:center}
.fbar::-webkit-scrollbar{display:none}
.chip{border:.5px solid var(--bd2);background:var(--s2);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;color:var(--t2);transition:all .15s;flex-shrink:0;-webkit-appearance:none;appearance:none;font-family:inherit}
.chip.active{background:var(--g);border-color:var(--g);color:#fff}
select.chip{padding-right:10px}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 100px;display:flex;flex-direction:column;gap:12px;min-height:0}

/* CARDS */
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sumcard{background:var(--s);border:.5px solid var(--bd);border-radius:var(--rad);padding:16px;cursor:pointer;transition:transform .1s;user-select:none}
.sumcard:active{transform:scale(.97)}
.sumcard.inc{border-left:3px solid var(--g)}
.sumcard.exp{border-left:3px solid var(--r)}
.sumlbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--t2);margin-bottom:8px}
.sumamt{font-size:20px;font-weight:700;letter-spacing:-.8px;line-height:1}
.green{color:var(--g)}.red{color:var(--r)}.blue{color:var(--b)}.orange{color:var(--o)}
.sumhint{font-size:10px;color:var(--t3);margin-top:6px}

.saldocard{background:var(--g);border-radius:var(--rad);padding:16px 18px;display:flex;align-items:center;justify-content:space-between}
.saldolbl{font-size:11px;font-weight:600;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.6px;margin-bottom:2px}
.saldoamt{font-size:26px;font-weight:700;color:#fff;letter-spacing:-1px}
.saldosub{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px}
.saldoico{font-size:28px;opacity:.7}

.card{background:var(--s);border:.5px solid var(--bd);border-radius:var(--rad);overflow:hidden}
.cardhdr{padding:14px 16px;border-bottom:.5px solid var(--bd);display:flex;align-items:center;gap:10px}
.cardhdr-title{font-size:13px;font-weight:600;flex:1}
.cardhdr-amt{font-size:15px;font-weight:700}
.backbtn{background:var(--s2);border:.5px solid var(--bd);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:500;color:var(--t2);cursor:pointer;font-family:inherit}

/* LIST */
.litem{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:.5px solid var(--bd);cursor:pointer;transition:background .1s;user-select:none}
.litem:last-child{border-bottom:none}
.litem:active{background:var(--s2)}
.lico{width:36px;height:36px;border-radius:10px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.linf{flex:1;overflow:hidden;min-width:0}
.lname{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lsub{font-size:11px;color:var(--t2);margin-top:2px}
.lright{text-align:right;flex-shrink:0}
.lamt{font-size:14px;font-weight:600}
.lpct{font-size:10px;color:var(--t3);margin-top:2px}
.larr{font-size:14px;color:var(--t3);margin-left:4px}
.barwrap{padding:0 16px 10px}
.barbg{height:3px;background:var(--s2);border-radius:2px}
.barfill{height:3px;border-radius:2px;transition:width .4s ease}
.barfill.green{background:var(--g)}
.barfill.red{background:var(--r)}

/* TX */
.txitem{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:.5px solid var(--bd)}
.txitem:last-child{border-bottom:none}
.txico{width:34px;height:34px;border-radius:9px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.txinf{flex:1;min-width:0}
.txname{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txdate{font-size:11px;color:var(--t2);margin-top:1px}
.txamt{font-size:13px;font-weight:600;flex-shrink:0}

/* EMPTY */
.empty{text-align:center;padding:44px 24px}
.empty-ico{font-size:52px;margin-bottom:14px}
.empty-title{font-size:17px;font-weight:600;margin-bottom:8px}
.empty-sub{font-size:13px;color:var(--t2);line-height:1.6}

/* UPLOAD */
.uzone{border:1.5px dashed var(--bd2);border-radius:var(--rad);padding:32px 20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--s)}
.uzone:active,.uzone.hasfile{border-color:var(--g);background:var(--gl)}
.uzico{font-size:40px;margin-bottom:12px}
.uztitle{font-size:15px;font-weight:600;margin-bottom:4px}
.uzsub{font-size:12px;color:var(--t2)}
.btn{width:100%;padding:15px;border-radius:var(--rads);border:none;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s}
.btn-sec{background:var(--s);border:.5px solid var(--bd2);color:var(--t)}
.btn-pri{background:var(--g);color:#fff}
.btn-pri:active{background:var(--gd)}
.errbox{background:var(--rl);border:.5px solid var(--r);border-radius:var(--rads);padding:12px 14px;font-size:13px;color:var(--r);line-height:1.5}
.seclbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--t3);padding:0 4px;margin-bottom:6px}
.stmtcard{background:var(--s);border:.5px solid var(--bd);border-radius:var(--rads);padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.stmtdel{background:var(--rl);border:.5px solid var(--r);border-radius:8px;padding:6px 10px;font-size:15px;cursor:pointer;color:var(--r)}

/* LOADING */
.loadcard{background:var(--s);border:.5px solid var(--bd);border-radius:var(--rad);padding:40px 24px;text-align:center}
.spinner{width:40px;height:40px;border:2.5px solid var(--bd2);border-top-color:var(--g);border-radius:50%;animation:spin .75s linear infinite;margin:0 auto 18px}
@keyframes spin{to{transform:rotate(360deg)}}
.loadtitle{font-size:15px;font-weight:600;margin-bottom:6px}
.loadsub{font-size:12px;color:var(--t2);line-height:1.6}

/* NAV */
.bnav{position:absolute;bottom:0;left:0;right:0;background:var(--s);border-top:.5px solid var(--bd);display:flex;padding-bottom:env(safe-area-inset-bottom,0);z-index:10;flex-shrink:0}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 8px;background:none;border:none;cursor:pointer;font-family:inherit;color:var(--t3);font-size:10px;font-weight:500;transition:color .15s}
.nbtn.active{color:var(--g)}
.nbico{font-size:20px}

/* DIALOG */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:150}
.dlg{background:var(--s);border-radius:20px 20px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom,0));width:100%;max-width:480px}
.dlgtitle{font-size:16px;font-weight:700;margin-bottom:8px}
.dlgsub{font-size:13px;color:var(--t2);margin-bottom:20px;line-height:1.5}
.dlgbtns{display:flex;gap:10px}
.dlgbtn{flex:1;padding:13px;border-radius:var(--rads);border:none;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer}
.dlgbtn.cancel{background:var(--s2);color:var(--t);border:.5px solid var(--bd2)}
.dlgbtn.confirm{background:var(--r);color:#fff}

/* ANALYTICS */
.acchip{border:.5px solid var(--bd2);background:var(--s2);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:500;cursor:pointer;color:var(--t2);transition:all .15s}
.acchip.sel0{background:var(--g);border-color:var(--g);color:#fff}
.acchip.sel1{background:var(--b);border-color:var(--b);color:#fff}
.acchip.sel2{background:var(--o);border-color:var(--o);color:#fff}
.chartwrap{padding:12px 16px;overflow-x:auto}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
'use strict';
const SK={DATA:'ff_d3',FILTER:'ff_f3',PIN:'ff_pin',API:'ff_api',LOCK:'ff_lock'};
const MS=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
const ML=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const CCOL=['var(--g)','var(--b)','var(--o)'];
const ICO={'Essen & Trinken':'🍽️','Supermarkt':'🛒','Fastfood':'🍔','Restaurant':'🍜','Bäckerei':'🥐','Kantine':'🏢','Lieferservice':'🛵','Transport':'🚗','Tanken':'⛽','ÖPNV':'🚆','Parken':'🅿️','Autobahn':'🛣️','Taxi':'🚕','Shopping':'🛍️','Kleidung':'👕','Elektronik':'💻','Online-Shopping':'📦','Haushalt':'🏡','Drogerie':'🧴','Gesundheit':'💊','Apotheke':'💊','Arzt':'🏥','Fitness':'🏋️','Freizeit':'🎮','Streaming':'📺','Kino':'🎬','Bar & Nightlife':'🍻','Hobbys':'🎯','Reisen':'✈️','Wohnen':'🏠','Miete':'🔑','Nebenkosten':'💡','Versicherung':'🛡️','Internet':'📡','GEZ':'📻','Finanzen':'💳','Sparen':'🏦','Investitionen':'📈','Gebühren':'💸','Kredit':'🏦','Einnahmen':'💚','Gehalt':'💼','Nebeneinkommen':'💡','Erstattung':'↩️','Sonstige Einnahmen':'💰','Sonstiges':'📋'};
function ico(n){return ICO[n]||'📋'}
function fmt(n){const s=Math.abs(n).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2});return(n<0?'−':'')+s+' €'}
function fmtP(n){return Math.abs(n).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' €'}

function ldData(){try{return JSON.parse(localStorage.getItem(SK.DATA))||{statements:[],transactions:[]}}catch{return{statements:[],transactions:[]}}}
function svData(d){localStorage.setItem(SK.DATA,JSON.stringify(d))}
function ldFilter(){try{const f=JSON.parse(localStorage.getItem(SK.FILTER));if(f)return f}catch{}const n=new Date();return{mode:'month',year:n.getFullYear(),month:n.getMonth()+1}}
function svFilter(f){localStorage.setItem(SK.FILTER,JSON.stringify(f))}

let A={
  tab:'home',filter:ldFilter(),data:ldData(),navStack:[],
  pFile:null,pName:null,analyzing:false,error:null,confirmDel:null,
  pinMode:null,pinIn:'',pinFirst:'',pinAttempts:0,
  pinLockUntil:parseInt(localStorage.getItem(SK.LOCK)||'0'),pinErr:'',pinReset:false,
  aFilter:ldFilter(),selCats:[],
};

function hasPin(){return!!localStorage.getItem(SK.PIN)}
function checkPin(p){return localStorage.getItem(SK.PIN)===p}
function setPin(p){localStorage.setItem(SK.PIN,p)}
function clearData(){localStorage.removeItem(SK.DATA);localStorage.removeItem(SK.FILTER);localStorage.removeItem(SK.PIN);localStorage.removeItem(SK.LOCK);A.data={statements:[],transactions:[]};A.filter=ldFilter();A.navStack=[]}
function initPin(){if(!hasPin()){A.pinMode='setup';A.pinIn=''}else{const now=Date.now();A.pinLockUntil>now?A.pinMode='locked':(A.pinMode='unlock',A.pinIn='')}}
initPin();
function unlocked(){return A.pinMode===null}

function handlePK(k){
  if(A.pinMode==='locked')return;
  const now=Date.now();
  if(A.pinLockUntil>now){A.pinMode='locked';render();return}
  if(k==='del'){A.pinIn=A.pinIn.slice(0,-1);A.pinErr='';render();return}
  if(A.pinIn.length>=4)return;
  A.pinIn+=k;
  if(A.pinIn.length===4){
    setTimeout(()=>{
      if(A.pinMode==='unlock'){
        if(checkPin(A.pinIn)){A.pinMode=null;A.pinAttempts=0;A.pinLockUntil=0;localStorage.removeItem(SK.LOCK);A.pinIn=''}
        else{
          A.pinAttempts++;
          if(A.pinAttempts>=5){const u=Date.now()+300000;A.pinLockUntil=u;localStorage.setItem(SK.LOCK,u+'');A.pinMode='locked';A.pinIn='';A.pinErr=''}
          else{A.pinErr=`Falscher PIN. Noch ${5-A.pinAttempts} Versuch${5-A.pinAttempts===1?'':'e'}.`;A.pinIn=''}
        }
      }else if(A.pinMode==='setup'){A.pinFirst=A.pinIn;A.pinIn='';A.pinMode='setup2';A.pinErr=''}
      else if(A.pinMode==='setup2'){
        if(A.pinIn===A.pinFirst){setPin(A.pinIn);A.pinMode=null;A.pinIn='';A.pinErr=''}
        else{A.pinErr='PINs stimmen nicht überein.';A.pinIn='';A.pinMode='setup';A.pinFirst=''}
      }
      render();
    },80);
  }else render();
}

function filTx(txList,f){
  const{mode,year,month,fromYear,fromMonth,toYear,toMonth}=f;
  return txList.filter(tx=>{
    const d=new Date(tx.date);if(!d||isNaN(d))return false;
    const y=d.getFullYear(),m=d.getMonth()+1;
    if(mode==='month')return y===year&&m===month;
    if(mode==='year')return y===year;
    if(mode==='range'){const n=y*12+m,fn=(fromYear||year)*12+(fromMonth||1),tn=(toYear||year)*12+(toMonth||12);return n>=fn&&n<=tn}
    return true;
  });
}
function getTx(){return filTx(A.data.transactions,A.filter)}
function calc(txList){let i=0,e=0;txList.forEach(tx=>{if(tx.amount>0)i+=tx.amount;else e+=Math.abs(tx.amount)});return{income:i,expense:e,balance:i-e}}
function grpBy(txList,type){
  const sign=type==='income'?1:-1,items=txList.filter(tx=>sign*tx.amount>0),cats={};
  items.forEach(tx=>{const c=tx.category||'Sonstiges',s=tx.subcategory||c;
    if(!cats[c])cats[c]={name:c,amount:0,subs:{},txCount:0};
    cats[c].amount+=Math.abs(tx.amount);cats[c].txCount++;
    if(!cats[c].subs[s])cats[c].subs[s]={name:s,amount:0,txs:[]};
    cats[c].subs[s].amount+=Math.abs(tx.amount);cats[c].subs[s].txs.push(tx);
  });
  return Object.values(cats).sort((a,b)=>b.amount-a.amount);
}
function flbl(f){
  const{mode,year,month,fromYear,fromMonth,toYear,toMonth}=f||A.filter;
  if(mode==='month')return`${ML[month-1]} ${year}`;
  if(mode==='year')return`Jahr ${year}`;
  if(mode==='range')return`${MS[(fromMonth||1)-1]} ${fromYear} – ${MS[(toMonth||12)-1]} ${toYear}`;
  return'Alle';
}
function curNav(){return A.navStack.length?A.navStack[A.navStack.length-1]:{view:'home'}}
function push(e){A.navStack.push(e)}
function pop(){A.navStack.pop()}
function allCats(){const c=new Set();A.data.transactions.forEach(tx=>{if(tx.category)c.add(tx.category);if(tx.subcategory&&tx.subcategory!==tx.category)c.add(tx.subcategory)});return Array.from(c).sort()}
function latSaldo(){if(!A.data.statements.length)return null;const ws=A.data.statements.filter(s=>s.endSaldo!=null);if(!ws.length)return null;ws.sort((a,b)=>new Date(b.uploadedAt)-new Date(a.uploadedAt));return ws[0]}

function render(){
  const app=document.getElementById('app');if(!app)return;
  if(!unlocked()){app.innerHTML=rPin();bindPin();return}
  const txList=getTx(),sum=calc(txList),nav=curNav();
  let content='';
  if(A.tab==='home'){
    if(nav.view==='home')content=rHome(txList,sum);
    else if(nav.view==='categories')content=rCats(txList,sum,nav);
    else if(nav.view==='subcategories')content=rSubs(txList,nav);
    else if(nav.view==='transactions')content=rTxs(txList,nav);
  }else if(A.tab==='analytics')content=rAnalytics();
  else if(A.tab==='upload')content=rUpload();
  else if(A.tab==='settings')content=rSettings();
  app.innerHTML=`${rHdr()}
    <div class="scroll">${content}</div>
    ${rNav()}
    ${A.confirmDel?rConfirm():''}
    ${A.pinReset?rPinReset():''}`;
  bindAll();
}

function rPin(){
  const now=Date.now(),locked=A.pinLockUntil>now;
  const rem=locked?Math.ceil((A.pinLockUntil-now)/1000):0;
  const mins=Math.floor(rem/60),secs=rem%60;
  let title='',sub='',showKP=true;
  if(A.pinMode==='setup'){title='PIN festlegen';sub='Lege einen 4-stelligen PIN fest.\n\n⚠️ Wenn du ihn vergisst, kannst du alle gespeicherten Daten löschen und neu starten.'}
  else if(A.pinMode==='setup2'){title='PIN wiederholen';sub='Gib den PIN zur Bestätigung nochmal ein.'}
  else if(A.pinMode==='unlock'){title='PIN eingeben';sub='Gib deinen PIN ein um FinanzFlow zu öffnen.'}
  else if(A.pinMode==='locked'){title='Zu viele Versuche';sub=`Bitte warte ${mins}:${secs.toString().padStart(2,'0')} Minuten.`;showKP=false}
  const dots=[0,1,2,3].map(i=>`<div class="pin-dot ${A.pinIn.length>i?(A.pinErr?'error':'filled'):''}"></div>`).join('');
  return`<div class="pin-screen">
    <div class="pin-logo">Finanz<span>Flow</span></div>
    <div style="height:20px"></div>
    <div class="pin-title">${title}</div>
    <div class="pin-sub">${sub.replace(/\n/g,'<br>')}</div>
    <div class="pin-dots">${dots}</div>
    ${showKP?`<div class="pin-keypad">
      ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="pin-key" data-pk="${n}">${n}</button>`).join('')}
      <button class="pin-key empty"></button>
      <button class="pin-key" data-pk="0">0</button>
      <button class="pin-key" data-pk="del">⌫</button>
    </div>`:`<div class="spinner" style="margin:20px auto"></div>`}
    <div class="pin-err">${A.pinErr}</div>
    ${(A.pinMode==='unlock'&&A.pinAttempts>0)||A.pinMode==='locked'?`<button class="pin-reset" id="pin-rst">PIN vergessen? Daten löschen und neu starten</button>`:''}
  </div>`;
}
function bindPin(){
  document.querySelectorAll('[data-pk]').forEach(el=>el.addEventListener('click',()=>handlePK(el.dataset.pk)));
  document.getElementById('pin-rst')?.addEventListener('click',()=>{A.pinReset=true;render()});
  if(A.pinMode==='locked'){
    const ms=A.pinLockUntil-Date.now();
    setTimeout(()=>{A.pinLockUntil=0;A.pinAttempts=0;A.pinMode='unlock';localStorage.removeItem(SK.LOCK);render()},ms);
    const iv=setInterval(()=>{if(A.pinMode==='locked')render();else clearInterval(iv)},1000);
  }
}

function rAnalytics(){
  const ac=allCats(),f=A.aFilter,{mode,year,month,fromYear,fromMonth,toYear,toMonth}=f;
  const curY=new Date().getFullYear(),curM=new Date().getMonth()+1,yrs=mkYears();
  let months=[];
  if(mode==='month')months=[{year,month,label:`${MS[month-1]} ${year}`}];
  else if(mode==='year')for(let m=1;m<=12;m++)months.push({year,month:m,label:MS[m-1]});
  else if(mode==='range'){
    const fy=fromYear||curY,fm=fromMonth||1,ty2=toYear||curY,tm=toMonth||curM;
    let cy=fy,cm=fm;
    while(cy*12+cm<=ty2*12+tm&&months.length<24){months.push({year:cy,month:cm,label:`${MS[cm-1]} ${cy}`});cm++;if(cm>12){cm=1;cy++}}
  }
  const series=A.selCats.map((cat,idx)=>({cat,color:CCOL[idx],values:months.map(({year:y,month:m})=>{const txs=A.data.transactions.filter(tx=>{const d=new Date(tx.date);return d.getFullYear()===y&&d.getMonth()+1===m&&(tx.category===cat||tx.subcategory===cat)});return txs.reduce((s,tx)=>s+Math.abs(tx.amount),0)})}));
  const hasData=series.length>0&&months.length>1;
  let chartHtml='';
  if(hasData){
    const W=320,H=150,P={t:10,r:10,b:30,l:52},cW=W-P.l-P.r,cH=H-P.t-P.b;
    const maxV=Math.max(...series.flatMap(s=>s.values),1),yMax=Math.ceil(maxV/10)*10||10;
    const xStep=cW/(months.length-1||1);
    const yLbls=[0,.25,.5,.75,1].map(t=>{const v=yMax*t,y=H-P.b-t*cH;return`<text x="${P.l-5}" y="${y+4}" text-anchor="end" font-size="9" fill="var(--t3)">${v>=1000?(v/1000).toFixed(1)+'k':v.toFixed(0)}</text><line x1="${P.l}" y1="${y}" x2="${W-P.r}" y2="${y}" stroke="var(--bd)" stroke-width="0.5"/>`}).join('');
    const step=Math.max(1,Math.ceil(months.length/6));
    const xLbls=months.map(({label},i)=>i%step!==0&&i!==months.length-1?'':` <text x="${P.l+i*xStep}" y="${H-P.b+14}" text-anchor="middle" font-size="9" fill="var(--t3)">${label}</text>`).join('');
    const lines=series.map(({values,color})=>{
      const pts=values.map((v,i)=>`${P.l+i*xStep},${H-P.b-(v/yMax)*cH}`).join(' ');
      const dots=values.map((v,i)=>`<circle cx="${P.l+i*xStep}" cy="${H-P.b-(v/yMax)*cH}" r="3" fill="${color}"/>`).join('');
      return`<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>${dots}`;
    }).join('');
    chartHtml=`<div class="chartwrap"><svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block">${yLbls}${xLbls}${lines}</svg></div>`;
  }
  const legend=series.length?`<div style="display:flex;flex-wrap:wrap;gap:8px;padding:0 16px 12px">${series.map(({cat,color})=>`<div style="display:flex;align-items:center;gap:4px;font-size:11px"><div style="width:10px;height:10px;border-radius:50%;background:${color}"></div>${cat}</div>`).join('')}</div>`:'';

  let fctrl='';
  if(f.mode==='month')fctrl=`<select class="chip active" id="am">${selOpts(MS.map((_,i)=>i+1),f.month||curM,i=>MS[i-1])}</select><select class="chip active" id="ay">${selOpts(yrs,f.year||curY)}</select>`;
  if(f.mode==='year')fctrl=`<select class="chip active" id="ay">${selOpts(yrs,f.year||curY)}</select>`;
  if(f.mode==='range')fctrl=`<select class="chip" id="afm">${selOpts(MS.map((_,i)=>i+1),f.fromMonth||1,i=>MS[i-1])}</select><select class="chip" id="afy">${selOpts(yrs,f.fromYear||curY)}</select><span style="font-size:11px;color:var(--t3)">bis</span><select class="chip" id="atm">${selOpts(MS.map((_,i)=>i+1),f.toMonth||curM,i=>MS[i-1])}</select><select class="chip" id="aty">${selOpts(yrs,f.toYear||curY)}</select>`;

  return`<div class="card">
    <div class="cardhdr"><div class="cardhdr-title">📈 Auswertung</div></div>
    <div style="padding:12px 16px;border-bottom:.5px solid var(--bd)">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--t3);margin-bottom:8px">Zeitraum</div>
      <div style="display:flex;gap:7px;flex-wrap:wrap;align-items:center">
        <button class="chip ${f.mode==='month'?'active':''}" data-amode="month">Monat</button>
        <button class="chip ${f.mode==='year'?'active':''}" data-amode="year">Jahr</button>
        <button class="chip ${f.mode==='range'?'active':''}" data-amode="range">Zeitraum</button>
        ${fctrl}
      </div>
    </div>
    <div style="padding:12px 16px;border-bottom:.5px solid var(--bd)">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--t3);margin-bottom:8px">Kategorien (max. 3)</div>
      ${ac.length===0?`<div style="font-size:13px;color:var(--t2)">Noch keine Daten. Lade einen Kontoauszug hoch.</div>`:`<div style="display:flex;flex-wrap:wrap;gap:7px">${ac.map(cat=>{const idx=A.selCats.indexOf(cat);return`<button class="acchip ${idx>=0?'sel'+idx:''}" data-acat="${encodeURIComponent(cat)}">${ico(cat)} ${cat}</button>`}).join('')}</div>`}
    </div>
    ${series.length===0?`<div style="padding:24px;text-align:center;color:var(--t2);font-size:13px">Wähle eine oder mehrere Kategorien</div>`:`${hasData?chartHtml:''}${legend}
    <div style="padding:0 16px 16px">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--t3);margin:12px 0 8px">Details</div>
      ${months.map(({year:y,month:m,label})=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:.5px solid var(--bd)">
          <div style="font-size:13px;font-weight:500">${label}</div>
          <div style="display:flex;gap:12px">${series.map(({values,color},i)=>{const idx=months.findIndex(mm=>mm.year===y&&mm.month===m);return`<div style="font-size:13px;font-weight:600;color:${color}">${fmtP(values[idx])}</div>`}).join('')}</div>
        </div>`).join('')}
    </div>`}
  </div>`;
}

async function analyze(){
  if(!A.pFile)return;
  A.analyzing=true;A.error=null;render();
  try{
    const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=()=>rej(new Error('Datei nicht lesbar'));r.readAsDataURL(A.pFile)});
    const fh=`${A.pFile.name}_${A.pFile.size}_${A.pFile.lastModified}`;
    const dup=A.data.statements.find(s=>s.fileHash===fh);
    if(dup)throw new Error(`Bereits hochgeladen am ${new Date(dup.uploadedAt).toLocaleDateString('de-DE')}.`);
    const apiKey=localStorage.getItem(SK.API)||'';
    if(!apiKey)throw new Error('Kein API Key. Bitte in Einstellungen eintragen.');
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:4000,messages:[{role:'user',content:[{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},{type:'text',text:`Extrahiere ALLE Buchungen aus diesem deutschen Kontoauszug. Antworte NUR mit diesem JSON (kein Text davor/danach, kein Markdown):\n{"endSaldo":1234.56,"transactions":[{"date":"YYYY-MM-DD","description":"max 45 Zeichen","amount":0.0,"category":"...","subcategory":"..."}]}\nKategorien: "Essen & Trinken","Transport","Shopping","Gesundheit","Freizeit","Wohnen","Finanzen","Einnahmen","Sonstiges"\nUnterkategorien: Supermarkt,Fastfood,Restaurant,Bäckerei,Lieferservice/Tanken,ÖPNV,Parken,Autobahn,Taxi/Kleidung,Elektronik,Online-Shopping,Drogerie/Apotheke,Arzt,Fitness/Streaming,Kino,Bar & Nightlife,Hobbys,Reisen/Miete,Nebenkosten,Versicherung,Internet,GEZ/Gehalt,Erstattung,Nebeneinkommen,Sonstige Einnahmen/Sparen,Investitionen,Gebühren,Kredit\nPositive Beträge=Einnahmen. Negative=Ausgaben. endSaldo=Kontostand am Ende des Auszugs (null wenn nicht erkennbar).`}]}]})});
    if(!resp.ok){let m=`API-Fehler ${resp.status}`;try{const e=await resp.json();m=e.error?.message||m}catch{}throw new Error(m)}
    const data=await resp.json();
    const text=data.content.map(c=>c.text||'').join('');
    let parsed;try{parsed=JSON.parse(text.replace(/```json|```/g,'').trim())}catch{throw new Error('Kontoauszug nicht lesbar. Bitte sicherstellen dass PDF Textinhalte hat (kein Scan).')}
    if(!parsed.transactions||!Array.isArray(parsed.transactions))throw new Error('Unerwartetes Format.');
    const sid='s'+Date.now();
    A.data.statements.push({id:sid,name:A.pName,fileHash:fh,uploadedAt:new Date().toISOString(),txCount:parsed.transactions.length,endSaldo:parsed.endSaldo??null});
    parsed.transactions.forEach((tx,i)=>A.data.transactions.push({...tx,id:sid+'_'+i,statementId:sid}));
    svData(A.data);A.pFile=null;A.pName=null;A.tab='home';A.navStack=[];
  }catch(e){A.error=e.message}
  A.analyzing=false;render();
}

function delStmt(id){A.data.statements=A.data.statements.filter(s=>s.id!==id);A.data.transactions=A.data.transactions.filter(tx=>tx.statementId!==id);svData(A.data);A.confirmDel=null;render()}

function bindAll(){
  // Nav
  document.getElementById('nav-home')?.addEventListener('click',()=>{A.tab='home';A.navStack=[];render()});
  document.getElementById('nav-ana')?.addEventListener('click',()=>{A.tab='analytics';render()});
  document.getElementById('nav-up')?.addEventListener('click',()=>{A.tab='upload';render()});
  document.getElementById('nav-set')?.addEventListener('click',()=>{A.tab='settings';render()});
  // Filter home
  document.querySelectorAll('[data-mode]').forEach(el=>el.addEventListener('click',()=>{
    const m=el.dataset.mode,n=new Date(),cy=n.getFullYear(),cm=n.getMonth()+1;
    if(m==='month')A.filter={mode:m,year:cy,month:cm};
    if(m==='year')A.filter={mode:m,year:cy};
    if(m==='range')A.filter={mode:m,fromYear:cy,fromMonth:1,toYear:cy,toMonth:cm};
    svFilter(A.filter);render();
  }));
  const bs=(id,key,obj)=>document.getElementById(id)?.addEventListener('change',e=>{obj[key]=+e.target.value;svFilter(A.filter);render()});
  bs('sm','month',A.filter);bs('sy','year',A.filter);bs('sfm','fromMonth',A.filter);bs('sfy','fromYear',A.filter);bs('stm','toMonth',A.filter);bs('sty','toYear',A.filter);
  // Analytics filter
  document.querySelectorAll('[data-amode]').forEach(el=>el.addEventListener('click',()=>{
    const m=el.dataset.amode,n=new Date(),cy=n.getFullYear(),cm=n.getMonth()+1;
    if(m==='month')A.aFilter={mode:m,year:cy,month:cm};
    if(m==='year')A.aFilter={mode:m,year:cy};
    if(m==='range')A.aFilter={mode:m,fromYear:cy,fromMonth:1,toYear:cy,toMonth:cm};
    render();
  }));
  const ba=(id,key)=>document.getElementById(id)?.addEventListener('change',e=>{A.aFilter[key]=+e.target.value;render()});
  ba('am','month');ba('ay','year');ba('afm','fromMonth');ba('afy','fromYear');ba('atm','toMonth');ba('aty','toYear');
  // Cat chips analytics
  document.querySelectorAll('[data-acat]').forEach(el=>el.addEventListener('click',()=>{
    const c=decodeURIComponent(el.dataset.acat),i=A.selCats.indexOf(c);
    if(i>=0)A.selCats.splice(i,1);else if(A.selCats.length<3)A.selCats.push(c);render();
  }));
  // Summary cards
  document.getElementById('card-inc')?.addEventListener('click',()=>{push({view:'categories',viewType:'income'});render()});
  document.getElementById('card-exp')?.addEventListener('click',()=>{push({view:'categories',viewType:'expense'});render()});
  // Cat items
  document.querySelectorAll('[data-cat]').forEach(el=>el.addEventListener('click',()=>{
    const cn=decodeURIComponent(el.dataset.cat),nav=curNav(),cats=grpBy(getTx(),nav.viewType),cat=cats.find(c=>c.name===cn);
    if(!cat)return;
    Object.keys(cat.subs).length>1?push({view:'subcategories',viewType:nav.viewType,viewCat:cn}):push({view:'transactions',viewType:nav.viewType,viewCat:cn,viewSub:Object.keys(cat.subs)[0]});
    render();
  }));
  // Sub items
  document.querySelectorAll('[data-sub]').forEach(el=>el.addEventListener('click',()=>{const nav=curNav();push({view:'transactions',viewType:nav.viewType,viewCat:nav.viewCat,viewSub:decodeURIComponent(el.dataset.sub)});render()}));
  // Back
  document.getElementById('btn-back')?.addEventListener('click',()=>{pop();render()});
  // Upload
  const fi=document.getElementById('fi');
  document.getElementById('btn-sel')?.addEventListener('click',()=>fi?.click());
  document.getElementById('uzone')?.addEventListener('click',()=>fi?.click());
  fi?.addEventListener('change',e=>{const f=e.target.files[0];if(f){A.pFile=f;A.pName=f.name;A.error=null;render()}});
  document.getElementById('btn-ana')?.addEventListener('click',analyze);
  // Delete stmt
  document.querySelectorAll('[data-del]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();const s=A.data.statements.find(x=>x.id===el.dataset.del);if(s){A.confirmDel=s;render()}}));
  document.getElementById('btn-cdel-no')?.addEventListener('click',()=>{A.confirmDel=null;render()});
  document.getElementById('btn-cdel-yes')?.addEventListener('click',()=>{if(A.confirmDel)delStmt(A.confirmDel.id)});
  document.getElementById('ov')?.addEventListener('click',e=>{if(e.target.id==='ov'){A.confirmDel=null;render()}});
  // Settings
  document.getElementById('btn-savekey')?.addEventListener('click',()=>{const v=document.getElementById('api-inp')?.value?.trim();if(!v){alert('Bitte Key eingeben');return}if(!v.startsWith('sk-ant-')){alert('Ungültiger Key (muss mit sk-ant- beginnen)');return}localStorage.setItem(SK.API,v);render()});
  document.getElementById('btn-chpin')?.addEventListener('click',()=>{A.pinMode='setup';A.pinIn='';A.pinFirst='';A.pinErr='';render()});
  document.getElementById('btn-clr')?.addEventListener('click',()=>{if(confirm('Wirklich alle Buchungen löschen?')){A.data={statements:[],transactions:[]};svData(A.data);render()}});
  // PIN reset confirm
  document.getElementById('btn-rst-no')?.addEventListener('click',()=>{A.pinReset=false;render()});
  document.getElementById('btn-rst-yes')?.addEventListener('click',()=>{clearData();A.pinReset=false;A.pinMode='setup';A.pinIn='';A.pinFirst='';A.pinErr='';render()});
  document.getElementById('ov-rst')?.addEventListener('click',e=>{if(e.target.id==='ov-rst'){A.pinReset=false;render()}});
}

if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
render();
</script>
</body>
</html>
